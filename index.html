<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS2 Starter Pack</title>

    body {
      margin: 0;
      padding: 0;
      background: #0f172a;

    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      padding: 20px;
    }

      font-size: 34px;
      margin-bottom: 15px;
    }

      color: #cbd5e1;
      line-height: 1.7;
    }

    .box {
      background: #1e293b;
      padding: 25px;
      border-radius: 14px;
      margin-top: 25px;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 28px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
      color: #e2e8f0;
      font-size: 17px;
      line-height: 2;
    }

    .small {
      margin-top: 18px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>CS2 Starter Pack</h1>
    <p>
      Free beginner pack for Counter-Strike 2 players
    </p>

    <div class="box">
      <p>This free pack includes:</p>
      <ul>
        <li>Best beginner settings</li>
        <li>Crosshair codes</li>
        <li>FPS boost checklist</li>

    </div>
  </div>
</body>
</html>
